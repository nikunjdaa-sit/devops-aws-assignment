name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Deploy to EC2 via SSH
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull latest code from GitHub
            cd /tmp
            rm -rf devops-aws-assignment
            git clone https://github.com/nikunjdaa-sit/devops-aws-assignment.git
            # Copy new index.html to Nginx web folder
            sudo cp devops-aws-assignment/index.html /var/www/html/index.html
            sudo chown www-data:www-data /var/www/html/index.html
            # Reload Nginx to serve new version
            sudo systemctl reload nginx
            echo "✅ Deployment successful!"
